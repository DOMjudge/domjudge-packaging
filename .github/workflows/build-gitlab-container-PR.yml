name: 'Build GitLab CI container (PR)'

on:
  merge_group:
  # We can't limit the files as below as this is a required check so should run
  # We exit early in case no relevant file changed
  pull_request:
    branches:
      - main
  push:
    # We don't start the job if no relevant file changed
    paths:
      # This is an `either`, so any file listed here will trigger
      - docker-contributor/php-config**
      - docker-gitlabci/**
      - .github/workflows/build-gitlab-container-PR.yml

jobs:
  pr-gitlab:
    name: PR GitLab image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed files and compute condition
        id: filter
        run: |
          set -eux
          git remote add organization "${{ github.event.pull_request.base.repo.clone_url }}"
          git remote add contributor  "${{ github.event.pull_request.head.repo.clone_url }}"
          git fetch organization
          git fetch contributor
          OREF="${{ github.event.pull_request.base.ref }}"
          CREF="${{ github.event.pull_request.head.ref }}"
          CHANGED=$(git diff --name-only "organization/$OREF" "contributor/$CREF")
          echo "changed_files: $CHANGED"
          echo "$CHANGED"
          echo "${GITHUB_EVENT_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "merge_group" ]]; then
            # We only wait in this state for the tests from the PR trigger to finish
            # This should also give 0 changed files so this is mostly explanation of the
            # 'interesting' GHA flow.
            echo "should_run=false" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "^docker-contributor/php-config"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "^docker-gitlabci"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif echo "$CHANGED" | grep -q "^.github/workflows/build-gitlab-container-PR.yml"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            # None of the interesting files changed
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        if: steps.filter.outputs.should_run == 'false'
        run: echo "Skip job, no important files changed"

      - name: Use the same PHP config as the contributor containers
        if: steps.filter.outputs.should_run == 'true'
        run: cp -r docker-{contributor,gitlabci}/php-config

      - name: Log in to GitHub Container registry (possibly at fork)
        if: steps.filter.outputs.should_run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: steps.filter.outputs.should_run == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Building an example chroot
        if: steps.filter.outputs.should_run == 'true'
        run: docker-gitlabci/build_ci_chroot.sh

      - name: Build and push Docker images
        if: steps.filter.outputs.should_run == 'true'
        uses: docker/build-push-action@v5
        with:
          context: "./docker-gitlabci" 
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

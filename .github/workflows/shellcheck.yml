name: 'Shellcheck'

on:
  merge_group:
  # This means we will also run on main@domjudge/domjudge-packaging
  # where we ran the same for the merge-queue
  push:
  pull_request:
    branches:
      - main

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
